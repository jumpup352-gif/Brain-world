// ====== 問題データ ======
const CALC_BANK = {
  easy: [
    { q: "5 + 8", a: 13 }, { q: "12 + 7", a: 19 }, { q: "15 − 6", a: 9 },
    { q: "9 + 6", a: 15 }, { q: "20 − 8", a: 12 }, { q: "7 + 7", a: 14 },

  hard: [

    { q: "24 × 6 − 38", a: 106 }, { q: "8 × 9 + 47", a: 119 }, { q: "132 − 57 + 28", a: 103 },
    { q: "17 × 4", a: 68 }, { q: "144 ÷ 12 × 6", a: 72 },
  ],
};

const ALL_COLORS = [
  { name: "あか", hex: "#E74C3C" },
  { name: "あお", hex: "#3498DB" },
  { name: "みどり", hex: "#27AE60" },
  { name: "きいろ", hex: "#F1C40F" },
  { name: "むらさき", hex: "#9B59B6" },
];

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function generateCalcOptions(correct, type) {
  const spread = type === "hard" ? 24 : type === "normal" ? 14 : 8;
  const opts = new Set([correct]);
  let guard = 0;
  while (opts.size < 4 && guard < 100) {
    guard++;
    const delta = Math.floor(Math.random() * spread) - spread / 2;
    const val = correct + Math.round(delta);
    if (val !== correct && val > 0) opts.add(val);
  }
  return shuffle([...opts]);
}

// ストループ問題を生成（mismatch=trueなら文字と色を食い違わせる）
function buildStroopItems(level) {
  const cfg = LEVEL_CONFIG[level].stroop;
  const pool = ALL_COLORS.slice(0, cfg.colors);
  const items = [];
  for (let i = 0; i < cfg.count; i++) {
    const wordColor = pool[Math.floor(Math.random() * pool.length)];
    let displayColor;
    if (cfg.mismatch) {
      // 文字の意味と違う色にする
      const others = pool.filter(c => c.name !== wordColor.name);
      displayColor = others[Math.floor(Math.random() * others.length)];
    } else {
      // やさしい：文字と色を一致させる
      displayColor = wordColor;
    }
    items.push({ word: wordColor.name, color: displayColor.hex, answer: displayColor.name });
  }
  return items;
}

function calcBrainAge(scores, level) {
  const cfg = LEVEL_CONFIG[level];
  let base = cfg.ageBase;
  // reaction (理想280ms, 上限750ms)
  const rxNorm = Math.max(0, Math.min(1, (scores.reaction - 280) / 470));
  base += rxNorm * 18;
  base += (1 - scores.memory) * 18;
  base += (1 - scores.calc) * 14;
  base += (1 - scores.stroop) * 18;
  return Math.round(Math.max(cfg.ageBase, Math.min(cfg.ageMax, base)));
}

function getBrainComment(age) {
  if (age <= 30) return { emoji: "🧠✨", text: "素晴らしい！脳がとても若く活発に動いています。この調子で毎日の脳トレを続けましょう！" };
  if (age <= 40) return { emoji: "🧠💪", text: "とても良い結果です！記憶力・反応力・計算力のバランスが取れています。" };
  if (age <= 50) return { emoji: "🧠👍", text: "平均的な結果です。毎日少しずつ脳トレを続けることで改善が期待できます！" };
  if (age <= 60) return { emoji: "🧠🌱", text: "改善の余地があります。毎日の脳トレで確実に若返ります！焦らず続けましょう。" };

}

function ReactionTest({ level, onComplete, onRestart }) {
  const cfg = LEVEL_CONFIG[level].reaction;
  const TOTAL = cfg.rounds;
  const [phase, setPhase] = useState("wait"); // wait | feint | go | early | trap | result
  const [times, setTimes] = useState([]);
  const [count, setCount] = useState(0);
  const [penalty, setPenalty] = useState(0);
  const [startTime, setStartTime] = useState(null);
  const timerRef = useRef(null);
  const feintRef = useRef(null);

  const startRound = useCallback(() => {
    setPhase("wait");
    const delay = 1400 + Math.random() * 2000;
    if (cfg.feint && Math.random() < 0.5) {
      const feintAt = delay * (0.4 + Math.random() * 0.3);
      feintRef.current = setTimeout(() => {
        setPhase("feint");
        setTimeout(() => setPhase("wait"), 550);
      }, feintAt);
    }
    timerRef.current = setTimeout(() => {
      setPhase("go");
      setStartTime(Date.now());
    }, delay);
  }, [cfg.feint]);

  useEffect(() => {
    const t = setTimeout(startRound, 500);
    return () => { clearTimeout(t); clearTimeout(timerRef.current); clearTimeout(feintRef.current); };
  }, [startRound]);

  const advance = (newTimes, newPenalty) => {
    const newCount = count + 1;
    setCount(newCount);
    if (newCount >= TOTAL) {
      const avg = newTimes.length
        ? Math.round(newTimes.reduce((a,b)=>a+b,0) / newTimes.length)
        : 700;
      setTimeout(() => onComplete(avg + newPenalty * 80), 700);
      setPhase("result");
    } else {
      setPhase("wait");
      setTimeout(startRound, 800);
    }
  };

  const handleTap = () => {
    if (phase === "go") {
      const rt = Date.now() - startTime;
      const newTimes = [...times, rt];
      setTimes(newTimes);
      advance(newTimes, penalty);
    } else if (phase === "feint") {
      clearTimeout(timerRef.current);
      const np = penalty + 1;
      setPenalty(np);
      setPhase("trap");
      setTimeout(() => advance(times, np), 1000);
    } else if (phase === "wait") {
      clearTimeout(timerRef.current);
      clearTimeout(feintRef.current);
      setPhase("early");
      setTimeout(() => { setPhase("wait"); setTimeout(startRound, 800); }, 1000);
    }
  };

  const colors = { wait:"#DDD", feint:"#E74C3C", go:"#2ECC71", early:"#E74C3C", trap:"#E67E22", result:"#3498DB" };
  const inner = { wait:"待機中...", feint:"押すな！", go:"タップ！", early:"早い！", trap:"引っかかった！", result:"完了" };

  return (
    <div className="card">
      <TestHeader step={1} level={level} title="⚡ 反応速度テスト" onRestart={onRestart} />
      <p className="desc">
        円が<strong style={{color:"#2ECC71"}}>緑</strong>になったら速くタップ！
        {cfg.feint && <><br/><strong style={{color:"#E74C3C"}}>赤のときは押してはいけません</strong></>}
      </p>
      <div style={{fontSize:"14px",color:"#999",marginBottom:"8px"}}>{count} / {TOTAL} 回</div>
      <div className="reaction-target" style={{background: colors[phase] || "#DDD"}} onClick={handleTap}>
        <span style={{fontSize:"15px",fontWeight:700}}>{inner[phase]}</span>
      </div>
      <p style={{fontSize:"13px",color:"#AAA"}}>
        {times.length > 0 ? `最速: ${Math.min(...times)}ms` : "　"}
        {penalty > 0 ? `（ミス ${penalty}回）` : ""}
      </p>
    </div>
  );
}

function MemoryTest({ level, onComplete, onRestart }) {
  const cfg = LEVEL_CONFIG[level].memory;
  const DIGITS = cfg.digits;
  const [round, setRound] = useState(0);
  const [phase, setPhase] = useState("show");
  const [numbers, setNumbers] = useState([]);
  const [input, setInput] = useState("");
  const [results, setResults] = useState([]);
  const [feedback, setFeedback] = useState("");
  const [showTimer, setShowTimer] = useState(cfg.showSeconds);
  const timerRef = useRef(null);

  const nextRound = useCallback((r) => {
    const len = DIGITS[r];
    const nums = Array.from({length: len}, () => Math.floor(Math.random()*10));
    setNumbers(nums);
    setPhase("show");
    setInput("");
    setFeedback("");
    setShowTimer(cfg.showSeconds);
    let t = cfg.showSeconds;
    timerRef.current = setInterval(() => {
      t--;
      setShowTimer(t);
      if (t <= 0) { clearInterval(timerRef.current); setPhase("input"); }
    }, 1000);
  }, [DIGITS, cfg.showSeconds]);

  useEffect(() => {
    nextRound(0);
    return () => clearInterval(timerRef.current);
  }, [nextRound]);

  const handleInput = (n) => {
    if (input.length >= numbers.length) return;
    setInput(prev => prev + n);
  };

  const handleSubmit = () => {
    const correct = numbers.join("") === input;
    setFeedback(correct ? "ok" : "ng");
    const newResults = [...results, correct ? 1 : 0];
    setResults(newResults);
    const nextR = round + 1;
    if (nextR >= DIGITS.length) {
      setTimeout(() => onComplete(newResults.filter(Boolean).length / DIGITS.length), 800);
    } else {
      setRound(nextR);
      setTimeout(() => nextRound(nextR), 900);
    }
  };

  return (
    <div className="card">
      <TestHeader step={2} level={level} title="🔢 記憶力テスト" onRestart={onRestart} />
      {phase === "show" ? (
        <>
          <p className="desc">この数字を覚えてください！</p>
          <div className="timer-circle">{showTimer}</div>
          <div className="memory-grid">
            {numbers.map((n, i) => <div key={i} className="memory-item">{n}</div>)}
          </div>
        </>
      ) : (
        <>
          <p className="desc">さっきの数字を順番に入力してください<br/><span style={{fontSize:"13px",color:"#AAA"}}>（{numbers.length}桁）</span></p>
          <div className="big-number" style={{fontSize:"44px",letterSpacing:"6px",minHeight:"60px"}}>{input || "　"}</div>
          <div className={`feedback ${feedback}`}>
            {feedback === "ok" ? "✓ 正解！" : feedback === "ng" ? "✗ 不正解" : "　"}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"8px",marginTop:"8px"}}>
            {[1,2,3,4,5,6,7,8,9,"←",0,"OK"].map(k => (
              <button key={k} className="answer-btn" style={{padding:"18px",fontSize:"20px"}}
                onClick={() => {
                  if (k === "←") setInput(i => i.slice(0,-1));
                  else if (k === "OK") handleSubmit();
                  else handleInput(String(k));
                }}
                disabled={!!feedback}
              >{k}</button>
            ))}
          </div>
        </>
      )}
      <p style={{fontSize:"13px",color:"#AAA",marginTop:"8px"}}>{round + 1} / {DIGITS.length} 問</p>
    </div>
  );
}

function CalcTest({ level, onComplete, onRestart }) {
  const cfg = LEVEL_CONFIG[level].calc;
  const problems = useRef(shuffle(CALC_BANK[cfg.type]).slice(0, cfg.count)).current;
  const [idx, setIdx] = useState(0);
  const [results, setResults] = useState([]);
  const [selected, setSelected] = useState(null);
  const [options, setOptions] = useState([]);

  useEffect(() => {
    setOptions(generateCalcOptions(problems[idx].a, cfg.type));
    setSelected(null);
  }, [idx, problems, cfg.type]);

  const handleAnswer = (val) => {
    if (selected !== null) return;
    setSelected(val);
    const correct = val === problems[idx].a;
    const newResults = [...results, correct ? 1 : 0];
    setResults(newResults);
    setTimeout(() => {
      const next = idx + 1;
      if (next >= problems.length) onComplete(newResults.filter(Boolean).length / problems.length);
      else setIdx(next);
    }, 800);
  };

  const prob = problems[idx];
  return (
    <div className="card">
      <TestHeader step={3} level={level} title="➕ 計算テスト" onRestart={onRestart} />
      <p className="desc">正しい答えを選んでください</p>
      <div className="big-number">{prob.q} ＝ ?</div>
      <div className="answer-grid">
        {options.map(o => {
          let cls = "answer-btn";
          if (selected !== null) {
            if (o === prob.a) cls += " correct";
            else if (o === selected) cls += " wrong";
          }
          return <button key={o} className={cls} onClick={() => handleAnswer(o)}>{o}</button>;
        })}
      </div>
      <p style={{fontSize:"13px",color:"#AAA",marginTop:"8px"}}>{idx + 1} / {problems.length} 問</p>
    </div>
  );
}

function StroopTest({ level, onComplete, onRestart }) {
  const cfg = LEVEL_CONFIG[level].stroop;
  const items = useRef(buildStroopItems(level)).current;
  const pool = ALL_COLORS.slice(0, cfg.colors);
  const LIMIT = cfg.limit;
  const [idx, setIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [feedback, setFeedback] = useState("");
  const [timeLeft, setTimeLeft] = useState(LIMIT || 0);
  const tickRef = useRef(null);
  const resultsRef = useRef([]);
  const idxRef = useRef(0);

  const goNext = useCallback((newResults) => {
    clearInterval(tickRef.current);
    const next = idxRef.current + 1;
    if (next >= items.length) {
      onComplete(newResults.filter(Boolean).length / items.length);
    } else {
      idxRef.current = next;
      setIdx(next);
      setSelected(null);
      setFeedback("");
      if (LIMIT) setTimeLeft(LIMIT);
    }
  }, [items.length, onComplete, LIMIT]);

  useEffect(() => {
    if (!LIMIT) return;
    setTimeLeft(LIMIT);
    tickRef.current = setInterval(() => {
      setTimeLeft(prev => {
        if (prev <= 1) {
          clearInterval(tickRef.current);
          const newResults = [...resultsRef.current, 0];
          resultsRef.current = newResults;
          setFeedback("ng");
          setSelected("__timeout__");
          setTimeout(() => goNext(newResults), 700);
          return 0;
        }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(tickRef.current);
  }, [idx, goNext, LIMIT]);

  const handleAnswer = (colorName) => {
    if (selected) return;
    clearInterval(tickRef.current);
    setSelected(colorName);
    const correct = colorName === items[idx].answer;
    setFeedback(correct ? "ok" : "ng");
    const newResults = [...resultsRef.current, correct ? 1 : 0];
    resultsRef.current = newResults;
    setTimeout(() => goNext(newResults), 700);
  };

  const item = items[idx];
  return (
    <div className="card">
      <TestHeader step={4} level={level} title="🎨 色識別テスト" onRestart={onRestart} />
      <p className="desc">
        文字の<strong>色</strong>は何色ですか？
        {cfg.mismatch && <><br/><span style={{fontSize:"13px",color:"#AAA"}}>（文字の意味ではなく、色で答えて！）</span></>}
      </p>
      {LIMIT && (
        <div style={{fontSize:"15px",fontWeight:700,color: timeLeft<=1 ? "#E74C3C" : "#FF8C42",marginBottom:"4px"}}>
          ⏱ 残り {timeLeft} 秒
        </div>
      )}
      <div className="stroop-word" style={{color: item.color}}>{item.word}</div>
      <div className={`feedback ${feedback}`}>
        {feedback === "ok" ? "✓ 正解！" : feedback === "ng" ? "✗ 不正解" : "　"}
      </div>
      <div className="color-grid" style={{gridTemplateColumns: pool.length >= 5 ? "1fr 1fr 1fr" : `repeat(${Math.min(pool.length,2)}, 1fr)`}}>
        {pool.map(c => (
          <button key={c.name} className="color-btn" style={{background: c.hex, opacity: selected ? 0.7 : 1}}
            onClick={() => handleAnswer(c.name)} disabled={!!selected}>{c.name}</button>
        ))}
      </div>
      <p style={{fontSize:"13px",color:"#AAA",marginTop:"8px"}}>{idx + 1} / {items.length} 問</p>
    </div>
  );
}

function ResultScreen({ scores, level, onRetry, onChangeLevel }) {
  const brainAge = calcBrainAge(scores, level);
  const { emoji, text } = getBrainComment(brainAge);
  const c = LEVEL_CONFIG[level];

  const scoreLabel = (v) => v >= 0.9 ? "🌟 優秀" : v >= 0.75 ? "👍 良好" : v >= 0.5 ? "📈 普通" : "🌱 要練習";
  const rxLabel = (ms) => ms < 300 ? "🌟 超速い！" : ms < 400 ? "👍 速い" : ms < 550 ? "📈 普通" : "🌱 ゆっくり";

  return (
    <div className="card">
      <div className="badge">{emoji} 測定完了 <span className={`level-pill ${c.pill}`}>Lv{level} {c.name}</span></div>
      <h2>あなたの脳年齢は</h2>
      <div className="result-age">{brainAge}</div>
      <div className="result-label">歳</div>
      <div className="result-comment">{text}</div>
      <div style={{marginBottom:"20px"}}>
        <div className="score-row"><span>⚡ 反応速度</span><span>{scores.reaction}ms — {rxLabel(scores.reaction)}</span></div>
        <div className="score-row"><span>🔢 記憶力</span><span>{Math.round(scores.memory*100)}点 — {scoreLabel(scores.memory)}</span></div>
        <div className="score-row"><span>➕ 計算力</span><span>{Math.round(scores.calc*100)}点 — {scoreLabel(scores.calc)}</span></div>
        <div className="score-row"><span>🎨 識別力</span><span>{Math.round(scores.stroop*100)}点 — {scoreLabel(scores.stroop)}</span></div>
      </div>
      <button className="btn btn-primary" style={{background:"linear-gradient(135deg, #06C755, #04A244)",boxShadow:"0 6px 20px rgba(6,199,85,0.35)"}}>
        📲 LINEで結果をシェア
      </button>
      {level < 3 && (
        <button className="btn btn-primary" onClick={() => onChangeLevel(level + 1)}>
          ⬆️ もっと上のレベルに挑戦
        </button>
      )}
      <button className="btn btn-secondary" onClick={onChangeLevel ? () => onChangeLevel(null) : onRetry}>
        🔄 難易度を選び直す
      </button>
      <p style={{fontSize:"12px",color:"#BBB",marginTop:"8px"}}>毎日チャレンジして脳を若く保とう！</p>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState("intro");
  const [level, setLevel] = useState(1);
  const [scores, setScores] = useState({});

  const startLevel = (lv) => {
    setLevel(lv);
    setScores({});
    setScreen("reaction");
  };

  const restart = () => {
    setScores({});
    setScreen("level");
  };

  return (
    <>
      <style>{style}</style>
      <div className="app">
        <div className="blob blob1" />
        <div className="blob blob2" />
        <div className="blob blob3" />
        {screen === "intro" && <IntroScreen onStart={() => setScreen("level")} />}
        {screen === "level" && <LevelSelectScreen onSelect={startLevel} />}
        {screen === "reaction" && (
          <ReactionTest level={level} onRestart={restart} onComplete={(ms) => { setScores(s=>({...s,reaction:ms})); setScreen("memory"); }} />
        )}
        {screen === "memory" && (
          <MemoryTest level={level} onRestart={restart} onComplete={(r) => { setScores(s=>({...s,memory:r})); setScreen("calc"); }} />
        )}
        {screen === "calc" && (
          <CalcTest level={level} onRestart={restart} onComplete={(r) => { setScores(s=>({...s,calc:r})); setScreen("stroop"); }} />
        )}
        {screen === "stroop" && (
          <StroopTest level={level} onRestart={restart} onComplete={(r) => { setScores(s=>({...s,stroop:r})); setScreen("result"); }} />
        )}
        {screen === "result" && (
          <ResultScreen
            scores={scores}
            level={level}
            onChangeLevel={(lv) => { if (lv) startLevel(lv); else setScreen("level"); }}
          />
        )}
      </div>
    </>
  );
}


const rootEl = document.getElementById('root');
ReactDOM.createRoot(rootEl).render(React.createElement(App));
</script>
</body>
</html>
